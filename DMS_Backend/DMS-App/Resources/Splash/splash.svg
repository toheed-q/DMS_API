<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!--
    The DMS mark: the same isometric box as SplashOverlay.xaml, so the native
    splash Android shows while the app loads matches the animated splash that
    follows it.

    The coordinates are pre-multiplied rather than wrapped in a <g transform>.
    The resizetizer that turns this into Android drawables has a limited SVG
    reader, and a group transform is the kind of thing it can silently drop —
    which produces an empty splash image instead of an error. Plain absolute
    paths avoid relying on it.

    Source box is 120x124 (as in SplashOverlay.xaml), scaled 2x and centred:
    x' = 108 + 2x, y' = 104 + 2y.

    The surrounding colour comes from MauiSplashScreen Color in the csproj.
  -->
  <path d="M124,172 L228,232 L228,344 L124,284 Z" fill="#64B5F6" />
  <path d="M332,172 L228,232 L228,344 L332,284 Z" fill="#1E88E5" />
  <path d="M228,112 L332,172 L228,232 L124,172 Z" fill="#BBDEFB" />
</svg>
