<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!--
    Adaptive-icon foreground: the same DMS isometric box as the splash.

    Scaled smaller than the splash version on purpose. Android crops adaptive
    icons to a circle, squircle or rounded square depending on the launcher, so
    the artwork has to sit inside the centre safe zone (~66% of the canvas) or
    the corners get clipped on some phones.

    The background colour behind this comes from MauiIcon Color in the csproj.
  -->
  <g transform="translate(132,129) scale(1.6)">
    <path d="M8,34 L60,64 L60,120 L8,90 Z"     fill="#64B5F6" />
    <path d="M112,34 L60,64 L60,120 L112,90 Z" fill="#1E88E5" />
    <path d="M60,4 L112,34 L60,64 L8,34 Z"     fill="#BBDEFB" />
  </g>
</svg>
